<!DOCTYPE html>
<html>

<body>
  <div class="container">
    <div class="header" style="background: #dc3545;">
      <h2>⚠️ Overdue Fees Alert</h2>
    </div>
    <div class="content">
      <div style="background: #f8d7da; padding: 20px; text-align: center; margin: 20px 0;">
        <p style="font-size: 24px; margin: 0;">{{count}} Students</p>
        <p style="font-size: 32px; font-weight: bold; margin: 10px 0;">₹{{total_overdue}}</p>
        <p>Total Overdue Amount</p>
      </div>

      <h3>Top 10 Overdue Accounts</h3>
      <table class="data-table">
        <tr>
          <th>Student</th>
          <th>Course</th>
          <th>Overdue</th>
          <th>Days</th>
        </tr>
        {{#students}}
        <tr>
          <td>{{name}}</td>
          <td>{{course}}</td>
          <td>₹{{amount}}</td>
          <td>{{days}} days</td>
        </tr>
        {{/students}}
      </table>

      <p><a href="{{full_report_url}}">View Complete Report →</a></p>
    </div>
  </div>
</body>

</html>
