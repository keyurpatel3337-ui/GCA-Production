<!DOCTYPE html>
<html>

<body>
  <div class="container">
    <div class="header" style="background: #dc3545;">
      <h3>❌ Payment Failed</h3>
    </div>
    <div class="content">
      <div style="background: #f8d7da; padding: 15px; border-left: 4px solid #dc3545;">
        A payment transaction has failed and requires attention.
      </div>

      <table>
        <tr>
          <td><strong>Student</strong></td>
          <td>{{student_name}}</td>
        </tr>
        <tr>
          <td><strong>Amount</strong></td>
          <td>₹{{amount}}</td>
        </tr>
        <tr>
          <td><strong>Transaction ID</strong></td>
          <td>{{transaction_id}}</td>
        </tr>
        <tr>
          <td><strong>Gateway</strong></td>
          <td>{{gateway}}</td>
        </tr>
        <tr>
          <td><strong>Error</strong></td>
          <td>{{error_message}}</td>
        </tr>
        <tr>
          <td><strong>Time</strong></td>
          <td>{{failure_time}}</td>
        </tr>
      </table>

      <p>Please check with payment gateway for status.</p>
    </div>
  </div>
</body>

</html>
