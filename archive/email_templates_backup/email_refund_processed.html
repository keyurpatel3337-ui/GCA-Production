<!DOCTYPE html>
<html>

<body>
  <div class="container">
    <div class="header" style="background: #17a2b8;">
      <h3>💳 Refund Processed</h3>
    </div>
    <div class="content">
      <p>A refund has been processed with the following details:</p>

      <table>
        <tr>
          <td><strong>Student</strong></td>
          <td>{{student_name}}</td>
        </tr>
        <tr>
          <td><strong>Refund Amount</strong></td>
          <td>₹{{amount}}</td>
        </tr>
        <tr>
          <td><strong>Reference No</strong></td>
          <td>{{reference_no}}</td>
        </tr>
        <tr>
          <td><strong>Refund Mode</strong></td>
          <td>{{refund_mode}}</td>
        </tr>
        <tr>
          <td><strong>Reason</strong></td>
          <td>{{reason}}</td>
        </tr>
        <tr>
          <td><strong>Processed By</strong></td>
          <td>{{processed_by}}</td>
        </tr>
        <tr>
          <td><strong>Date</strong></td>
          <td>{{process_date}}</td>
        </tr>
      </table>
    </div>
  </div>
</body>

</html>
